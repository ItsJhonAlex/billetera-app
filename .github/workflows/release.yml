name: Release

# Se dispara al publicar un tag de versión, p. ej. v0.0.1 o v1.2.3.
# Compila el APK de producción y lo adjunta a una Release de GitHub.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Generar código (Drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Tests
        run: flutter test

      # Firma de release. Si están configurados los secrets, se decodifica el
      # keystore y se firma con él (necesario para que las ACTUALIZACIONES
      # funcionen sin desinstalar). Si no, se compila con firma debug.
      - name: Preparar keystore de firma
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.BILLETERA_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/billetera.jks"
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Sin keystore (secrets BILLETERA_KEYSTORE_BASE64). Se firma con clave debug; las actualizaciones requerirán desinstalar."
          fi

      - name: Compilar APK de producción
        env:
          BILLETERA_KEYSTORE: ${{ steps.keystore.outputs.configured == 'true' && format('{0}/billetera.jks', runner.temp) || '' }}
          BILLETERA_STORE_PASSWORD: ${{ secrets.BILLETERA_STORE_PASSWORD }}
          BILLETERA_KEY_ALIAS: ${{ secrets.BILLETERA_KEY_ALIAS }}
          BILLETERA_KEY_PASSWORD: ${{ secrets.BILLETERA_KEY_PASSWORD }}
        run: |
          flutter build apk --flavor prod --release --no-tree-shake-icons
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-prod-release.apk "dist/billetera-${{ github.ref_name }}.apk"

      - name: Publicar Release con el APK
        uses: softprops/action-gh-release@v2
        with:
          files: dist/billetera-${{ github.ref_name }}.apk
          generate_release_notes: true
